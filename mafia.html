<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mafia Game">

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="icon" sizes="512x512" href="icon-512.png">

<meta charset="UTF-8">
<title>Mafia Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
  --admin:#ef4444;
  --player:#22c55e;
  --accent:#6366f1;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top, #020617, #000);
  font-family:system-ui;
  color:var(--text);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* --- FLOATING BACK BUTTON --- */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 100; /* Under splash screen, above everything else */
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}

/* 🌌 BACKGROUND FLOATING EMOJIS */
.bg-emoji{
  position:absolute;
  font-size:42px;
  opacity:.50;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(110vh)}
  to{transform:translateY(-120px)}
}

/* 🎴 MAIN CARD */
.card{
  position:relative;
  width:100%;
  max-width:380px;
  background:var(--card);
  border-radius:26px;
  padding:30px 22px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,.7);
  animation:fadeUp .8s ease;
  z-index: 10;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* ✨ FLOATING EMOJIS ON CARD */
.card-emoji{
  position:absolute;
  font-size:26px;
  opacity:.6;
  animation:cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.card-emoji.one{top:-12px;left:20px}
.card-emoji.two{top:-14px;right:26px}
.card-emoji.three{bottom:-14px;left:30px}

/* TEXT */
.title{
  font-size:36px;
  font-weight:900;
  letter-spacing:1px;
}

.subtitle{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
}

/* BUTTONS */
.choice{
  margin-top:28px;
  display:grid;
  gap:16px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:20px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  transition:transform .2s ease, box-shadow .2s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}

button:active{
  transform:scale(.97);
}

.admin{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:white;
}

.player{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#052e16;
}

.how{
  background:#020617;
  color:var(--muted);
  border:1px solid #1e293b;
  font-size:16px;
}

/* FOOTER */
.footer{
  margin-top:22px;
  font-size:12px;
  color:var(--muted);
}

/* SPLASH SCREEN */
#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeOut 0.6s ease forwards;
  animation-delay: 3.8s;
}

.splash-content {
  text-align: center;
  animation: scaleIn 1s ease;
}

.splash-content .logo {
  font-size: 72px;
  filter: drop-shadow(0 0 18px rgba(99,102,241,0.8));
  animation: pulse 1.4s infinite;
}

.splash-content h1 {
  margin: 12px 0 6px;
  font-size: 28px;
  letter-spacing: 1px;
}

.splash-content p {
  font-size: 12px;
  color: #94a3b8;
}

/* Animations */
@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

</style>
</head>

<body>

<div id="splash">
  <div class="splash-content">
    <div class="logo">🎭</div>
    <h1>Mafia Game</h1>
    <p>Developed by Hirani Tech</p>
  </div>
</div>

<a href="index.html" class="back-btn">
    <span>⬅️</span> Back to Hub
</a>

<span class="bg-emoji" style="left:10%;animation-duration:18s;">😈</span>
<span class="bg-emoji" style="left:40%;animation-duration:22s;">🧑</span>
<span class="bg-emoji" style="left:70%;animation-duration:20s;">🩺</span>
<span class="bg-emoji" style="left:85%;animation-duration:26s;">😈</span>
<span class="bg-emoji" style="left:25%;animation-duration:24s;">🧑</span>

<div class="card">

  <span class="card-emoji one">😈</span>
  <span class="card-emoji two">🧑</span>
  <span class="card-emoji three">🩺</span>

  <div class="title">🎭 Mafia</div>
  <div class="subtitle">Classic party game • Digital roles</div>

  <div class="choice">
    <button class="admin" onclick="goAdmin()">
      👑 Become a God
    </button>

    <button class="player" onclick="goPlayer()">
      🎭 Join as a Player
    </button>

    <button class="how" onclick="goHow()">
      📜 How to Play
    </button>
  </div>

  <div class="footer">
    © <span id="year"></span> Hirani Tech — Developed by Pritesh Hirani
  </div>
</div>

<script>
function goAdmin(){
  location.href = "admin.html";
}
function goPlayer(){
  location.href = "player.html";
}
function goHow(){
  location.href = "how_to_play.html";
}
document.getElementById("year").textContent = new Date().getFullYear();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

const icons = ["🎭","😈","🩺","🕵️"];
let i = 0;
setInterval(()=>{
  const logoEl = document.querySelector(".logo");
  if(logoEl) logoEl.textContent = icons[i++ % icons.length];
},600);

window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) splash.remove();
  }, 2400);
});
</script>

</body>
</html>
