<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Patchwork Puzzle</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        padding: 70px 15px 20px; 
    }

    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
        transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

    .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 400px; }
    
    .level-selector {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 5px;
    }

    .nav-arrow {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .nav-arrow:hover:not(:disabled) { background: rgba(255, 255, 255, 0.25); transform: scale(1.1); }
    .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

    h2 {
        font-size: clamp(26px, 7vw, 34px);
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 10px;
        min-width: 120px; 
    }

    p.subtitle { color: #94a3b8; font-size: 14px; font-weight: 500; transition: color 0.3s ease; }

    /* --- GAME BOARD --- */
    .game-container {
        width: 100%;
        max-width: 420px;
        aspect-ratio: 1 / 1;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        position: relative;
        touch-action: none; 
        user-select: none;
        -webkit-user-select: none;
    }

    .grid {
        position: absolute;
        inset: 0;
        display: grid;
        z-index: 10;
        pointer-events: none; 
    }

    .cell {
        border: 1px solid rgba(0,0,0,0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: clamp(16px, 5vw, 28px);
        font-weight: 700;
        color: #1e293b;
    }

    .clue-icon { font-size: 0.5em; margin-left: 3px; color: #64748b; }

    .patches-container {
        position: absolute;
        inset: 0;
        z-index: 5; 
        pointer-events: none;
    }

    /* --- PATCHES & HINTS --- */
    .patch {
        position: absolute;
        border-radius: 12px;
        border: 3px solid rgba(255, 255, 255, 0.8);
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.2);
        opacity: 0.95;
        animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .preview-patch {
        position: absolute;
        border-radius: 12px;
        background: rgba(56, 189, 248, 0.3);
        border: 3px dashed #38bdf8;
        z-index: 6;
        display: none;
    }

    .hint-patch {
        position: absolute;
        border-radius: 12px;
        background: rgba(245, 158, 11, 0.2);
        border: 4px dashed #f59e0b;
        z-index: 7;
        display: none;
        animation: hintPulse 1s infinite;
        pointer-events: none;
    }

    .patch.error {
        background: rgba(239, 68, 68, 0.7) !important;
        border-color: #ef4444 !important;
        animation: shake 0.3s ease !important;
    }

    .legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 15px;
        margin-bottom: 20px;
        color: #94a3b8;
        font-size: 13px;
        font-weight: 500;
    }

    /* --- CONTROLS --- */
    .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        width: 100%;
        max-width: 400px;
    }

    button.action-btn {
        flex: 1 1 30%;
        min-width: 90px;
        padding: 14px 10px;
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-restart { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); }
    .btn-restart:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

    .btn-hint { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
    .btn-hint:hover { box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6); transform: translateY(-2px); }

    .btn-next { background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); display: none; flex: 1 1 100%; }
    .btn-next:hover { box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6); transform: translateY(-2px); }

    /* --- CREDITS FOOTER --- */
    .credits {
        margin-top: auto;
        padding-top: 30px;
        font-size: 12px;
        color: #64748b;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.5px;
    }

    /* Animations */
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    @keyframes hintPulse { 0%, 100% { opacity: 0.5; box-shadow: 0 0 10px #f59e0b; } 50% { opacity: 1; box-shadow: 0 0 25px #fcd34d; } }
    .tada-anim { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
</style>
</head>
<body>

<a href="index.html" class="back-btn">⬅️ Back to Hub</a>

<div class="header">
    <div class="level-selector">
        <button class="nav-arrow" id="prevLvlBtn" onclick="changeLevel(-1)">◀</button>
        <h2 id="levelText">Level 1</h2>
        <button class="nav-arrow" id="nextLvlBtn" onclick="changeLevel(1)">▶</button>
    </div>
    <p class="subtitle" id="statusText">Drag to draw patches from the clues.</p>
</div>

<div class="game-container" id="gameBoard">
    <div id="patchesContainer" class="patches-container"></div>
    <div id="previewPatch" class="preview-patch"></div>
    <div id="hintPatch" class="hint-patch"></div>
    <div id="grid" class="grid"></div>
</div>

<div class="legend">
    <span>↔ Wide</span>
    <span>↕ Tall</span>
    <span>■ Square</span>
</div>

<div class="controls">
    <button class="action-btn btn-restart" onclick="restartLevel()">Reset 🔄</button>
    <button class="action-btn btn-hint" id="hintBtn" onclick="showHint()">Hint 💡</button>
    <button class="action-btn btn-next" id="nextBtn" onclick="nextLevel()">Next Level 🌸</button>
</div>

<div class="credits">
    © <span id="year"></span> Hirani Tech — Developed by Pritesh Hirani
</div>

<script>
    // Update the year dynamically
    document.getElementById('year').textContent = new Date().getFullYear();

    // --- AUDIO SYSTEM ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    const sfx = {
        draw: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        },
        success: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            setTimeout(() => osc.frequency.setValueAtTime(600, audioCtx.currentTime), 100);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        },
        error: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        },
        delete: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        },
        hint: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            setTimeout(() => osc.frequency.setValueAtTime(800, audioCtx.currentTime), 150);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        },
        win: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            setTimeout(() => osc.frequency.setValueAtTime(659.25, audioCtx.currentTime), 100); 
            setTimeout(() => osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime), 200); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }
    };

    // --- INFINITE PROCEDURAL LEVEL GENERATOR ---
    const patchColors = ['#f43f5e', '#8b5cf6', '#0ea5e9', '#10b981', '#f59e0b', '#d946ef', '#14b8a6', '#f97316'];
    
    function partitionGrid(size) {
        let rects = [{r1: 0, c1: 0, r2: size-1, c2: size-1}];
        let finalRects = [];
        
        while(rects.length > 0) {
            let rect = rects.shift(); 
            let w = rect.c2 - rect.c1 + 1;
            let h = rect.r2 - rect.r1 + 1;
            let area = w * h;
            
            let shouldSplit = false;
            // Mathematical bounds to ensure nice puzzle distribution
            if (area > 12) shouldSplit = true;
            else if (area > 6 && Math.random() < 0.8) shouldSplit = true;
            else if (area > 3 && Math.random() < 0.5) shouldSplit = true;
            else if (area > 1 && Math.random() < 0.2) shouldSplit = true;
            
            let canSplitH = w >= 2;
            let canSplitV = h >= 2;
            
            if (shouldSplit && (canSplitH || canSplitV)) {
                let splitDir = '';
                if (canSplitH && canSplitV) {
                    if (w > h) splitDir = 'H';
                    else if (h > w) splitDir = 'V';
                    else splitDir = Math.random() < 0.5 ? 'H' : 'V';
                } else if (canSplitH) {
                    splitDir = 'H';
                } else {
                    splitDir = 'V';
                }
                
                if (splitDir === 'H') {
                    let splitOffset = Math.floor(w / 2);
                    if (w > 3 && Math.random() < 0.5) splitOffset += (Math.random() < 0.5 ? 1 : -1);
                    let splitC = rect.c1 + splitOffset - 1; 
                    rects.push({r1: rect.r1, c1: rect.c1, r2: rect.r2, c2: splitC});
                    rects.push({r1: rect.r1, c1: splitC + 1, r2: rect.r2, c2: rect.c2});
                } else {
                    let splitOffset = Math.floor(h / 2);
                    if (h > 3 && Math.random() < 0.5) splitOffset += (Math.random() < 0.5 ? 1 : -1);
                    let splitR = rect.r1 + splitOffset - 1;
                    rects.push({r1: rect.r1, c1: rect.c1, r2: splitR, c2: rect.c2});
                    rects.push({r1: splitR + 1, c1: rect.c1, r2: rect.r2, c2: rect.c2});
                }
            } else {
                finalRects.push(rect);
            }
        }
        return finalRects;
    }

    function generateLevelData(size) {
        let finalRects = partitionGrid(size);
        let clues = [];
        let solutions = [];
        
        for (let rect of finalRects) {
            let w = rect.c2 - rect.c1 + 1;
            let h = rect.r2 - rect.r1 + 1;
            let area = w * h;
            
            // Randomly place the number clue inside its rectangle
            let cr = rect.r1 + Math.floor(Math.random() * h);
            let cc = rect.c1 + Math.floor(Math.random() * w);
            
            let shape = 'any';
            let icon = '';
            
            // Give specific shape requirements 75% of the time for extra logic testing
            if (Math.random() < 0.75) {
                if (w === h) { shape = 'square'; icon = '■'; }
                else if (w > h) { shape = 'wide'; icon = '↔'; }
                else { shape = 'tall'; icon = '↕'; }
            } else if (area === 1) {
                shape = 'square'; icon = '■';
            }
            
            clues.push({r: cr, c: cc, val: area, shape: shape, icon: icon});
            solutions.push({minR: rect.r1, maxR: rect.r2, minC: rect.c1, maxC: rect.c2});
        }
        return { size, clues, solutions };
    }

    let generatedLevels = JSON.parse(localStorage.getItem('patchworkLevelsData')) || [];
    let currentLevelIndex = parseInt(localStorage.getItem('patchworkLevel')) || 0;
    let maxUnlocked = parseInt(localStorage.getItem('patchworkMaxLevel')) || currentLevelIndex;
    
    function getOrGenerateLevel(index) {
        while (generatedLevels.length <= index) {
            let L = generatedLevels.length + 1;
            let size = 4;
            if (L >= 4) size = 5;
            if (L >= 8) size = 6;
            if (L >= 14) size = 7;
            if (L >= 20) size = 8;
            if (L >= 30) size = 9; // The ultimate difficulty ceiling
            
            generatedLevels.push(generateLevelData(size));
            localStorage.setItem('patchworkLevelsData', JSON.stringify(generatedLevels));
        }
        return generatedLevels[index];
    }
    
    // --- ENGINE STATE ---
    let size, patches = [], isWon = false, colorIndex = 0;
    let hintTimeout;
    
    // Pure Additive Drag Bounding Box
    let isDrawing = false;
    let minDrawR = -1, maxDrawR = -1, minDrawC = -1, maxDrawC = -1;

    const gridEl = document.getElementById('grid');
    const gameBoard = document.getElementById('gameBoard');
    const previewPatch = document.getElementById('previewPatch');
    const hintPatch = document.getElementById('hintPatch');
    const patchesContainer = document.getElementById('patchesContainer');
    const levelText = document.getElementById('levelText');
    const statusText = document.getElementById('statusText');
    const nextBtn = document.getElementById('nextBtn');
    const hintBtn = document.getElementById('hintBtn');
    const prevLvlBtn = document.getElementById('prevLvlBtn');
    const nextLvlBtn = document.getElementById('nextLvlBtn');

    function updateNavButtons() {
        prevLvlBtn.disabled = (currentLevelIndex <= 0);
        nextLvlBtn.disabled = (currentLevelIndex >= maxUnlocked);
    }

    function changeLevel(dir) {
        initAudio(); sfx.draw();
        let newIndex = currentLevelIndex + dir;
        if (newIndex >= 0 && newIndex <= maxUnlocked) {
            currentLevelIndex = newIndex;
            loadLevel();
        }
    }

    function loadLevel() {
        initAudio();
        isWon = false;
        patches = [];
        colorIndex = 0;
        
        let levelData = getOrGenerateLevel(currentLevelIndex);
        size = levelData.size;
        
        localStorage.setItem('patchworkLevel', currentLevelIndex);
        levelText.innerText = `Level ${currentLevelIndex + 1}`;
        statusText.innerText = "Drag to draw patches from the clues.";
        statusText.style.color = "#94a3b8";
        statusText.classList.remove('tada-anim');
        nextBtn.style.display = "none";
        hintBtn.style.display = "block";
        hintPatch.style.display = "none";
        
        updateNavButtons();
        buildBoard(levelData.clues);
        renderPatches();
    }

    function buildBoard(clues) {
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        gridEl.style.gridTemplateRows = `repeat(${size}, 1fr)`;

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                
                let clue = clues.find(cl => cl.r === r && cl.c === c);
                if(clue) {
                    cell.innerHTML = `${clue.val}<span class="clue-icon">${clue.icon}</span>`;
                }
                gridEl.appendChild(cell);
            }
        }
    }

    function showHint() {
        initAudio();
        clearTimeout(hintTimeout);
        hintPatch.style.display = 'none';

        let currentSolutions = getOrGenerateLevel(currentLevelIndex).solutions;
        let missingSolution = currentSolutions.find(sol => {
            let alreadyDrawn = patches.some(p => p.minR === sol.minR && p.maxR === sol.maxR && p.minC === sol.minC && p.maxC === sol.maxC);
            if (alreadyDrawn) return false;
            
            // Only suggest a hint that doesn't overlap with patches you already drew
            let overlaps = patches.some(p => !(sol.maxR < p.minR || sol.minR > p.maxR || sol.maxC < p.minC || sol.minC > p.maxC));
            return !overlaps; 
        });

        // Fallback: If you messed up the board and blocked all solutions, show any missing one to guide you
        if (!missingSolution) {
            missingSolution = currentSolutions.find(sol => {
                return !patches.some(p => p.minR === sol.minR && p.maxR === sol.maxR && p.minC === sol.minC && p.maxC === sol.maxC);
            });
        }

        if (missingSolution) {
            sfx.hint();
            hintPatch.style.top = `${(missingSolution.minR / size) * 100}%`;
            hintPatch.style.left = `${(missingSolution.minC / size) * 100}%`;
            hintPatch.style.width = `${((missingSolution.maxC - missingSolution.minC + 1) / size) * 100}%`;
            hintPatch.style.height = `${((missingSolution.maxR - missingSolution.minR + 1) / size) * 100}%`;
            hintPatch.style.display = 'block';

            hintTimeout = setTimeout(() => { hintPatch.style.display = 'none'; }, 3000);
        } else {
            sfx.error();
        }
    }

    function getGridPos(e) {
        let rect = gameBoard.getBoundingClientRect();
        let x = (e.clientX || e.touches[0].clientX) - rect.left;
        let y = (e.clientY || e.touches[0].clientY) - rect.top;
        
        x = Math.max(0, Math.min(x, rect.width - 1));
        y = Math.max(0, Math.min(y, rect.height - 1));
        
        let c = Math.floor(x / (rect.width / size));
        let r = Math.floor(y / (rect.height / size));
        return {r, c};
    }

    function getPatchAt(r, c) {
        for (let i = 0; i < patches.length; i++) {
            let p = patches[i];
            if (r >= p.minR && r <= p.maxR && c >= p.minC && c <= p.maxC) return i;
        }
        return null;
    }

    function handlePointerDown(e) {
        initAudio();
        if (isWon) return;
        
        hintPatch.style.display = 'none';
        clearTimeout(hintTimeout);

        let pos = getGridPos(e);
        if (!pos) return;
        
        let clickedPatchId = getPatchAt(pos.r, pos.c);
        if (clickedPatchId !== null) {
            patches.splice(clickedPatchId, 1);
            sfx.delete();
            renderPatches();
            return;
        }

        isDrawing = true;
        minDrawR = maxDrawR = pos.r;
        minDrawC = maxDrawC = pos.c;
        updatePreview();
    }

    function handlePointerMove(e) {
        if (!isDrawing || isWon) return;
        e.preventDefault(); 
        let pos = getGridPos(e);
        if (!pos) return;
        
        let expanded = false;
        
        if (pos.r < minDrawR) { minDrawR = pos.r; expanded = true; }
        if (pos.r > maxDrawR) { maxDrawR = pos.r; expanded = true; }
        if (pos.c < minDrawC) { minDrawC = pos.c; expanded = true; }
        if (pos.c > maxDrawC) { maxDrawC = pos.c; expanded = true; }

        if (expanded) {
            sfx.draw();
            updatePreview();
        }
    }

    function handlePointerUp() {
        if (!isDrawing || isWon) return;
        isDrawing = false;
        finalizePatch();
    }

    gameBoard.addEventListener('mousedown', handlePointerDown);
    gameBoard.addEventListener('touchstart', handlePointerDown, {passive: false});
    
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('touchmove', handlePointerMove, {passive: false});
    
    window.addEventListener('mouseup', handlePointerUp);
    window.addEventListener('touchend', handlePointerUp);
    window.addEventListener('touchcancel', () => { isDrawing = false; previewPatch.style.display = 'none'; });

    // --- RECTANGLE LOGIC ---
    function updatePreview() {
        previewPatch.style.top = `${(minDrawR / size) * 100}%`;
        previewPatch.style.left = `${(minDrawC / size) * 100}%`;
        previewPatch.style.width = `${((maxDrawC - minDrawC + 1) / size) * 100}%`;
        previewPatch.style.height = `${((maxDrawR - minDrawR + 1) / size) * 100}%`;
        previewPatch.style.display = 'block';
    }

    function finalizePatch() {
        previewPatch.style.display = 'none';
        let minR = minDrawR; let maxR = maxDrawR;
        let minC = minDrawC; let maxC = maxDrawC;

        for (let p of patches) {
            if (!(maxR < p.minR || minR > p.maxR || maxC < p.minC || minC > p.maxC)) {
                rejectPatch(minR, maxR, minC, maxC); return;
            }
        }

        let currentClues = getOrGenerateLevel(currentLevelIndex).clues;
        let coveredClues = currentClues.filter(cl => 
            cl.r >= minR && cl.r <= maxR && cl.c >= minC && cl.c <= maxC
        );

        if (coveredClues.length !== 1) { rejectPatch(minR, maxR, minC, maxC); return; }

        let clue = coveredClues[0];
        let w = maxC - minC + 1;
        let h = maxR - minR + 1;
        let area = w * h;

        if (area !== clue.val) { rejectPatch(minR, maxR, minC, maxC); return; }
        if (clue.shape === 'square' && w !== h) { rejectPatch(minR, maxR, minC, maxC); return; }
        if (clue.shape === 'wide' && w <= h) { rejectPatch(minR, maxR, minC, maxC); return; }
        if (clue.shape === 'tall' && h <= w) { rejectPatch(minR, maxR, minC, maxC); return; }

        patches.push({ minR, maxR, minC, maxC, color: patchColors[colorIndex % patchColors.length] });
        colorIndex++;
        sfx.success();
        renderPatches();
        checkWin();
    }

    function rejectPatch(minR, maxR, minC, maxC) {
        sfx.error();
        let errDiv = document.createElement('div');
        errDiv.className = 'patch error';
        errDiv.style.top = `${(minR / size) * 100}%`;
        errDiv.style.left = `${(minC / size) * 100}%`;
        errDiv.style.width = `${((maxC - minC + 1) / size) * 100}%`;
        errDiv.style.height = `${((maxR - minR + 1) / size) * 100}%`;
        patchesContainer.appendChild(errDiv);
        setTimeout(() => errDiv.remove(), 300);
    }

    function renderPatches() {
        patchesContainer.innerHTML = '';
        patches.forEach(p => {
            let div = document.createElement('div');
            div.className = 'patch';
            div.style.top = `${(p.minR / size) * 100}%`;
            div.style.left = `${(p.minC / size) * 100}%`;
            div.style.width = `${((p.maxC - p.minC + 1) / size) * 100}%`;
            div.style.height = `${((p.maxR - p.minR + 1) / size) * 100}%`;
            div.style.backgroundColor = p.color;
            patchesContainer.appendChild(div);
        });
    }

    function checkWin() {
        let coveredArea = patches.reduce((sum, p) => sum + (p.maxR - p.minR + 1) * (p.maxC - p.minC + 1), 0);
        if (coveredArea === size * size) {
            isWon = true;
            sfx.win();
            statusText.innerText = "Perfect Patchwork! 🌸";
            statusText.style.color = "#4ade80";
            statusText.classList.add('tada-anim');
            hintBtn.style.display = "none";
            
            if (currentLevelIndex === maxUnlocked) {
                maxUnlocked++;
                localStorage.setItem('patchworkMaxLevel', maxUnlocked);
                getOrGenerateLevel(maxUnlocked); 
            }
            updateNavButtons();

            nextBtn.style.display = 'block';
            nextBtn.classList.add('tada-anim');
        }
    }

    function restartLevel() {
        initAudio(); sfx.delete();
        hintPatch.style.display = 'none';
        clearTimeout(hintTimeout);
        loadLevel();
    }

    function nextLevel() {
        changeLevel(1);
    }

    // Initialize
    loadLevel();

</script>
