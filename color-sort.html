<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zen Color Sort</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1e1b4b 0%, #3b0764 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        padding: 70px 15px 30px; 
    }

    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
        transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

    .header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 400px; }
    
    /* --- LEVEL SELECTOR UI --- */
    .level-selector {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 5px;
    }

    .nav-arrow {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .nav-arrow:hover:not(:disabled) { background: rgba(255, 255, 255, 0.25); transform: scale(1.1); }
    .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: none; }

    h2 {
        font-size: clamp(26px, 7vw, 34px);
        background: linear-gradient(to right, #a855f7, #ec4899, #fbcfe8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 10px;
        min-width: 120px; /* Keeps arrows from jumping around */
    }

    p.subtitle { color: #c4b5fd; font-size: 14px; font-weight: 500; transition: color 0.3s ease; margin-top: 5px; }

    /* --- TUBES & LIQUID --- */
    #tubesContainer {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        width: 100%;
        max-width: 400px;
        margin-bottom: 40px;
    }

    .tube {
        width: 55px;
        height: 180px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: none;
        border-radius: 0 0 30px 30px;
        display: flex;
        flex-direction: column-reverse; 
        padding: 4px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
        box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        position: relative;
    }

    .tube.selected {
        transform: translateY(-25px);
        border-color: #fbcfe8;
        box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2), 0 20px 25px rgba(251, 207, 232, 0.3);
    }

    .liquid {
        width: 100%;
        height: 25%; 
        transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s ease;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }

    .liquid:first-child { border-radius: 0 0 22px 22px; }
    .liquid:last-child { border-radius: 6px 6px 0 0; }
    .liquid:only-child { border-radius: 6px 6px 22px 22px; }

    /* --- CONTROLS --- */
    .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        width: 100%;
        max-width: 380px;
    }

    button {
        flex: 1 1 45%;
        padding: 14px 10px;
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-restart { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); }
    .btn-restart:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

    .btn-hint { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
    .btn-hint:hover { box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6); transform: translateY(-2px); }

    .btn-next { background: linear-gradient(135deg, #ec4899 0%, #9d174d 100%); box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); display: none; width: 100%; flex: 1 1 100%; }
    .btn-next:hover { box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6); transform: translateY(-2px); }

    /* --- RESET PROGRESS BUTTON --- */
    .reset-progress-btn {
        background: transparent;
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 30px;
        transition: all 0.2s;
        opacity: 0.8;
    }
    .reset-progress-btn:hover { background: rgba(239, 68, 68, 0.1); opacity: 1; }

    /* Animations */
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    .shake-anim { animation: shake 0.4s ease; }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .tada-anim { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    @keyframes hintGlow { 0% { transform: translateY(0); border-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; } 50% { transform: translateY(-15px); border-color: #fcd34d; box-shadow: 0 0 30px #fcd34d; } 100% { transform: translateY(0); border-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; } }
    .hint-anim { animation: hintGlow 1s ease-in-out infinite; z-index: 20; }
</style>
</head>
<body>

<a href="index.html" class="back-btn">⬅️ Back to Hub</a>

<div class="header">
    <div class="level-selector">
        <button class="nav-arrow" id="prevLvlBtn" onclick="changeLevel(-1)">◀</button>
        <h2 id="levelText">Level 1</h2>
        <button class="nav-arrow" id="nextLvlBtn" onclick="changeLevel(1)">▶</button>
    </div>
    <p class="subtitle" id="statusText">Tap a tube to pour colors.</p>
</div>

<div id="tubesContainer"></div>

<div class="controls">
    <button class="btn-restart" onclick="restartLevel()">Restart 🔄</button>
    <button class="btn-hint" id="hintBtn" onclick="getHint()">Hint 💡</button>
    <button class="btn-next" id="nextBtn" onclick="nextLevel()">Next Level 🌸</button>
</div>

<button class="reset-progress-btn" onclick="resetAllProgress()" style="display: none;">
    Reset All Progress 🗑️
</button>
<script>
    // --- AUDIO SYSTEM ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    const sfx = {
        tap: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        },
        pour: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        },
        hint: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            setTimeout(() => osc.frequency.setValueAtTime(1000, audioCtx.currentTime), 100);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        },
        win: () => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            setTimeout(() => osc.frequency.setValueAtTime(659.25, audioCtx.currentTime), 100); 
            setTimeout(() => osc.frequency.setValueAtTime(783.99, audioCtx.currentTime), 200); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }
    };

    // --- GAME LOGIC ---
    const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#a855f7', '#ec4899', '#06b6d4', '#eab308'];
    
    // Load tracking from browser memory
    let currentLevel = parseInt(localStorage.getItem('zenColorSortLevel')) || 1;
    let maxUnlockedLevel = parseInt(localStorage.getItem('zenColorSortMaxLevel')) || currentLevel;
    
    let tubes = [];
    let initialTubesState = [];
    let selectedTubeIndex = null;
    let isGameWon = false;

    const container = document.getElementById('tubesContainer');
    const levelText = document.getElementById('levelText');
    const statusText = document.getElementById('statusText');
    const nextBtn = document.getElementById('nextBtn');
    const hintBtn = document.getElementById('hintBtn');
    const prevLvlBtn = document.getElementById('prevLvlBtn');
    const nextLvlBtn = document.getElementById('nextLvlBtn');

    function updateNavButtons() {
        prevLvlBtn.disabled = (currentLevel <= 1);
        nextLvlBtn.disabled = (currentLevel >= maxUnlockedLevel);
    }

    function changeLevel(direction) {
        initAudio(); sfx.tap();
        let newLevel = currentLevel + direction;
        if (newLevel >= 1 && newLevel <= maxUnlockedLevel) {
            currentLevel = newLevel;
            generateLevel(currentLevel);
        }
    }

    function resetAllProgress() {
        initAudio(); sfx.tap();
        if(confirm("Are you sure you want to erase all your progress and start over from Level 1?")) {
            localStorage.setItem('zenColorSortLevel', 1);
            localStorage.setItem('zenColorSortMaxLevel', 1);
            currentLevel = 1;
            maxUnlockedLevel = 1;
            generateLevel(1);
        }
    }

    function generateLevel(lvl) {
        initAudio();
        isGameWon = false;
        selectedTubeIndex = null;
        nextBtn.style.display = "none";
        hintBtn.style.display = "block";
        statusText.innerText = "Take your time. Relax and sort.";
        statusText.style.color = "#c4b5fd";
        levelText.innerText = `Level ${lvl}`;
        
        // Save current level selection
        localStorage.setItem('zenColorSortLevel', lvl);
        updateNavButtons();

        // Scale difficulty slowly
        let numColors = Math.min(2 + Math.floor(lvl / 2), COLORS.length); 
        if (lvl === 1) numColors = 3;
        let numEmpty = 2; // Always 2 empty tubes

        let tempTubes = [];
        for (let i = 0; i < numColors; i++) {
            tempTubes.push([COLORS[i], COLORS[i], COLORS[i], COLORS[i]]);
        }
        for (let i = 0; i < numEmpty; i++) {
            tempTubes.push([]);
        }

        // Mathematically shuffle the board backwards
        let shuffles = 50 + (lvl * 20);
        for (let i = 0; i < shuffles; i++) {
            let src = Math.floor(Math.random() * tempTubes.length);
            let dest = Math.floor(Math.random() * tempTubes.length);
            
            if (src !== dest && tempTubes[src].length > 0 && tempTubes[dest].length < 4) {
                tempTubes[dest].push(tempTubes[src].pop());
            }
        }

        tubes = JSON.parse(JSON.stringify(tempTubes));
        initialTubesState = JSON.parse(JSON.stringify(tempTubes));
        
        renderTubes();
    }

    function renderTubes() {
        container.innerHTML = '';
        tubes.forEach((tubeArr, index) => {
            let tubeEl = document.createElement('div');
            tubeEl.className = 'tube';
            tubeEl.id = `tube-${index}`; 
            
            if (selectedTubeIndex === index) tubeEl.classList.add('selected');
            
            tubeEl.onclick = () => handleTubeClick(index, tubeEl);

            // Draw liquid blocks
            tubeArr.forEach(color => {
                let liq = document.createElement('div');
                liq.className = 'liquid';
                liq.style.backgroundColor = color;
                tubeEl.appendChild(liq);
            });

            container.appendChild(tubeEl);
        });
    }

    function removeHintAnimations() {
        document.querySelectorAll('.tube').forEach(t => t.classList.remove('hint-anim'));
    }

    function handleTubeClick(index, element) {
        initAudio();
        removeHintAnimations(); 
        if (isGameWon) return;

        // SELECTING A TUBE
        if (selectedTubeIndex === null) {
            if (tubes[index].length > 0) {
                sfx.tap();
                selectedTubeIndex = index;
                renderTubes();
            }
        } 
        // DESELECTING OR POURING
        else {
            if (selectedTubeIndex === index) {
                sfx.tap();
                selectedTubeIndex = null;
                renderTubes();
            } else {
                let srcTube = tubes[selectedTubeIndex];
                let destTube = tubes[index];

                let srcTopColor = srcTube[srcTube.length - 1];
                let destTopColor = destTube[destTube.length - 1];

                if (destTube.length < 4 && (destTube.length === 0 || destTopColor === srcTopColor)) {
                    sfx.pour();
                    
                    while (srcTube.length > 0 && srcTube[srcTube.length - 1] === srcTopColor && destTube.length < 4) {
                        destTube.push(srcTube.pop());
                    }
                    
                    selectedTubeIndex = null;
                    renderTubes();
                    checkWinCondition();
                } else {
                    sfx.tap();
                    element.classList.remove('shake-anim');
                    void element.offsetWidth;
                    element.classList.add('shake-anim');
                    
                    if (tubes[index].length > 0) selectedTubeIndex = index;
                    else selectedTubeIndex = null;
                    renderTubes();
                }
            }
        }
    }

    // --- SMART HINT SYSTEM ---
    function getHint() {
        initAudio();
        removeHintAnimations(); 
        
        for (let i = 0; i < tubes.length; i++) {
            if (tubes[i].length === 0) continue; 
            
            let srcColor = tubes[i][tubes[i].length - 1];
            let isSolid = tubes[i].every(c => c === srcColor);
            
            if (isSolid && tubes[i].length === 4) continue;

            for (let j = 0; j < tubes.length; j++) {
                if (i === j) continue; 
                if (tubes[j].length === 4) continue; 

                let destEmpty = tubes[j].length === 0;
                if (destEmpty && isSolid) continue; // Don't move solid colors to empty tubes

                let destColor = destEmpty ? null : tubes[j][tubes[j].length - 1];

                if (destEmpty || destColor === srcColor) {
                    sfx.hint();
                    document.getElementById(`tube-${i}`).classList.add('hint-anim');
                    document.getElementById(`tube-${j}`).classList.add('hint-anim');
                    statusText.innerText = "Try pouring the glowing tubes! ✨";
                    statusText.style.color = "#fcd34d"; 
                    return;
                }
            }
        }
        
        sfx.tap();
        statusText.innerText = "No moves left! Time to restart. 🔄";
        statusText.style.color = "#f87171"; 
    }

    function checkWinCondition() {
        for (let t of tubes) {
            if (t.length > 0) {
                if (t.length < 4) return false; 
                let firstColor = t[0];
                for (let c of t) {
                    if (c !== firstColor) return false; 
                }
            }
        }

        isGameWon = true;
        sfx.win();
        statusText.innerText = "Beautifully sorted! 🌸";
        statusText.style.color = "#4ade80";
        statusText.classList.add('tada-anim');
        hintBtn.style.display = "none";
        nextBtn.style.display = "block";
        nextBtn.classList.add('tada-anim');
        selectedTubeIndex = null;
        
        // Unlock next level if needed
        if (currentLevel === maxUnlockedLevel) {
            maxUnlockedLevel++;
            localStorage.setItem('zenColorSortMaxLevel', maxUnlockedLevel);
        }
        
        updateNavButtons();
        renderTubes();
    }

    function restartLevel() {
        initAudio(); sfx.tap();
        removeHintAnimations();
        tubes = JSON.parse(JSON.stringify(initialTubesState));
        isGameWon = false;
        selectedTubeIndex = null;
        nextBtn.style.display = "none";
        hintBtn.style.display = "block";
        statusText.innerText = "Take your time. Relax and sort.";
        statusText.style.color = "#c4b5fd";
        statusText.classList.remove('tada-anim');
        renderTubes();
    }

    function nextLevel() {
        initAudio(); sfx.tap();
        currentLevel++;
        generateLevel(currentLevel);
    }

    // Initialize Game
    generateLevel(currentLevel);

    // Back button sound hook
    document.querySelector('.back-btn').addEventListener('click', () => { initAudio(); sfx.tap(); });
</script>

</body>
</html>
